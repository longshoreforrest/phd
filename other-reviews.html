  <script>
  (() => {
    const EL = document.getElementById('payload');
    const PAYLOAD = JSON.parse(EL.textContent); EL.remove();
    const STORE_KEY = "phd-tapio:auth-v1";
    const TTL_MS = 24*60*60*1000;
    const td = new TextDecoder(), te = new TextEncoder();
    const b64dec = (s) => Uint8Array.from(atob(s), c => c.charCodeAt(0));
    async function deriveKey(pw, salt){
      const bk = await crypto.subtle.importKey('raw', te.encode(pw), 'PBKDF2', false, ['deriveKey']);
      return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:600000,hash:'SHA-256'}, bk, {name:'AES-GCM',length:256}, false, ['decrypt']);
    }
    async function decryptWith(pw){
      const key = await deriveKey(pw, b64dec(PAYLOAD.salt));
      const pt = await crypto.subtle.decrypt({name:'AES-GCM',iv:b64dec(PAYLOAD.iv)}, key, b64dec(PAYLOAD.ciphertext));
      return td.decode(pt);
    }
    function reveal(html){ document.open(); document.write(html); document.close(); }
    function getStored(){ try{ const o=JSON.parse(localStorage.getItem(STORE_KEY)); if(!o||typeof o.p!=='string'||typeof o.t!=='number') return null; if(Date.now()-o.t>TTL_MS){localStorage.removeItem(STORE_KEY);return null;} return o.p; }catch(e){return null;} }
    function setStored(pw){ try{ localStorage.setItem(STORE_KEY, JSON.stringify({p:pw,t:Date.now()})); }catch(e){} }
    const stored = getStored();
    if (stored) decryptWith(stored).then(reveal).catch(()=>{});
    document.getElementById('f').addEventListener('submit', async (ev)=>{
      ev.preventDefault();
      const btn=document.getElementById('b'), err=document.getElementById('err'), pw=document.getElementById('pw').value;
      btn.disabled=true; btn.textContent='Decrypting…'; err.textContent='';
      try{ const html=await decryptWith(pw); setStored(pw); reveal(html); }
      catch(e){ btn.disabled=false; btn.textContent='Unlock'; err.textContent='Wrong password.'; document.getElementById('pw').select(); }
    });
  })();
  </script>
